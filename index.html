<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>우리집 식단앱</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="식단앱">
<meta name="theme-color" content="#F5F9F7">
<link rel="apple-touch-icon" href="icon.png">
<style>
  :root{
    --bg:#F5F9F7; --card:#FFFFFF; --ink:#1E2B27; --muted:#5E6F69;
    --line:#DCE6E2; --green:#1D6E52; --amber:#C77B1F; --red:#C0392B;
    --green-bg:#E8F3EE; --amber-bg:#FBF3E4; --red-bg:#FCEBEB; --radius:14px;
    --c-cold:#2E6FA3; --c-cold-bg:#E9F2F9;
    --c-frz:#5B6FB5; --c-frz-bg:#ECEFF9;
    --c-sce:#A3622E; --c-sce-bg:#F8F0E7;
    --c-room:#6B7A45; --c-room-bg:#F0F3E6;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:"Apple SD Gothic Neo","Pretendard","Noto Sans KR",system-ui,sans-serif;
    font-size:16px; line-height:1.5}
  .wrap{max-width:480px; margin:0 auto; padding:18px 16px 60px}
  header h1{font-size:21px; font-weight:700; margin:2px 0 10px; letter-spacing:-0.3px}
  .todaybar{background:var(--amber-bg); border:1px solid #EBD3A8; color:#7A4A12;
    border-radius:12px; padding:10px 13px; font-size:14px; font-weight:600; margin-bottom:12px}
  .nav{display:grid; grid-template-columns:repeat(5,1fr); gap:5px; margin-bottom:16px;
    position:sticky; top:0; background:var(--bg); padding:6px 0; z-index:10}
  .nav button{border:1.5px solid var(--line); background:var(--card); border-radius:11px;
    padding:10px 1px; font-size:13px; font-weight:600; color:var(--muted); cursor:pointer; font-family:inherit}
  .nav button.on{background:var(--ink); border-color:var(--ink); color:#fff}
  .panel{background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:16px; margin-bottom:14px}
  .sec-title{font-size:13px; font-weight:700; color:var(--muted); margin:0 0 10px; letter-spacing:0.02em}
  .hint{font-size:12.5px; color:var(--muted); margin:8px 0 0; line-height:1.6}
  .pagebtn{width:100%; border:none; background:var(--ink); color:#fff; border-radius:12px;
    padding:14px; font-size:15px; font-weight:700; cursor:pointer; font-family:inherit; margin-top:4px}
  .pagebtn.ghost{background:var(--card); color:var(--muted); border:1.5px solid var(--line); font-weight:600}
  input[type=text], textarea{width:100%; border:1.5px solid var(--line); border-radius:11px;
    padding:10px 13px; font-size:15px; font-family:inherit; background:var(--bg); color:var(--ink)}
  input:focus, textarea:focus{outline:none; border-color:var(--green)}
  textarea{resize:none; line-height:1.55}
  .toast{position:fixed; top:18px; left:50%; transform:translateX(-50%);
    background:var(--ink); color:#fff; font-size:14px; font-weight:600;
    padding:10px 18px; border-radius:999px; opacity:0; transition:opacity 0.25s; pointer-events:none; z-index:60}
  .toast.show{opacity:1}
  .sheet{display:none; position:fixed; left:16px; right:16px; bottom:20px; max-width:448px;
    margin:0 auto; background:var(--card); border:1px solid var(--line); border-radius:var(--radius);
    padding:14px; box-shadow:0 8px 30px rgba(20,40,35,0.15); z-index:55}
  .sheet.show{display:block}
  .sheet h3{font-size:14px; margin:0 0 8px; font-weight:700}
  .sheet textarea{height:150px; font-size:13px}
  .sheet .ok{margin-top:8px; width:100%; border:none; background:var(--green); color:#fff;
    border-radius:10px; padding:11px; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit}
  .sheet .cancel{margin-top:6px; width:100%; border:none; background:none; color:var(--muted);
    padding:8px; font-size:13px; cursor:pointer; font-family:inherit}

  .legend{display:flex; gap:12px; font-size:12px; color:var(--muted); margin:0 0 10px; flex-wrap:wrap}
  .legend i{width:8px; height:8px; border-radius:50%; display:inline-block; margin-right:5px}
  .ftabs{display:grid; grid-template-columns:repeat(4,1fr); gap:5px; margin-bottom:12px}
  .ftab{border:1.5px solid var(--line); background:var(--card); border-radius:11px;
    padding:9px 1px; font-size:13px; font-weight:600; color:var(--muted); text-align:center; cursor:pointer; font-family:inherit}
  .ftab .cnt{display:block; font-size:11px; font-weight:500; margin-top:1px}
  .ftab.on[data-k="cold"]{background:var(--c-cold-bg); border-color:var(--c-cold); color:var(--c-cold)}
  .ftab.on[data-k="frz"]{background:var(--c-frz-bg); border-color:var(--c-frz); color:var(--c-frz)}
  .ftab.on[data-k="room"]{background:var(--c-room-bg); border-color:var(--c-room); color:var(--c-room)}
  .ftab.on[data-k="sce"]{background:var(--c-sce-bg); border-color:var(--c-sce); color:var(--c-sce)}
  .items{display:flex; flex-wrap:wrap; gap:8px; min-height:40px}
  .empty{font-size:13px; color:var(--muted); padding:6px 2px}
  .item{display:inline-flex; align-items:center; gap:7px; border-radius:999px;
    padding:9px 6px 9px 13px; font-size:15px; font-weight:500; cursor:pointer;
    border:1.5px solid transparent; user-select:none}
  .item.full{background:var(--green-bg); color:#14523D; border-color:#BFDCCF}
  .item.low{background:var(--amber-bg); color:#7A4A12; border-color:#EBD3A8}
  .item.exp{background:var(--red-bg); color:#791F1F; border-color:#F09595}
  .item .dot{width:8px; height:8px; border-radius:50%}
  .item.full .dot{background:var(--green)}
  .item.low .dot{background:var(--amber)}
  .item.exp .dot{background:var(--red)}
  .item .del{width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center;
    border-radius:50%; opacity:0.55; flex:none}
  .addrow{display:flex; gap:8px; margin-top:13px}
  .addrow input{flex:1}
  .addrow button{border:none; background:var(--green); color:#fff; border-radius:11px;
    padding:0 18px; font-size:15px; font-weight:600; cursor:pointer; font-family:inherit}
  .chips{display:flex; flex-wrap:wrap; gap:7px; margin-top:10px}
  .chip{border:1.5px dashed var(--line); background:var(--card); border-radius:999px;
    padding:8px 13px; font-size:14px; color:var(--muted); cursor:pointer; font-family:inherit}

  .daycard{border:1px solid var(--line); border-radius:12px; padding:12px 13px; margin-bottom:10px; background:var(--card)}
  .dayhead{display:flex; align-items:baseline; gap:8px; margin-bottom:8px}
  .dayname{font-size:15px; font-weight:700}
  .theme{font-size:12px; color:var(--green); background:var(--green-bg); border-radius:999px; padding:3px 10px; font-weight:600}
  .mealrow{display:flex; align-items:center; gap:8px; margin-bottom:6px}
  .mealrow label{flex:0 0 36px; font-size:12.5px; color:var(--muted); font-weight:600}
  .mealrow input{padding:8px 11px; font-size:14.5px}
  details.mine{background:var(--green-bg); border:1px solid #BFDCCF; border-radius:12px; padding:12px 13px; margin-bottom:12px}
  details.mine summary{font-size:13.5px; font-weight:700; color:#14523D; cursor:pointer; list-style:none}
  details.mine summary::before{content:"▸ "}
  details.mine[open] summary::before{content:"▾ "}
  details.mine > div{margin-top:10px}
  .prepitem{display:flex; align-items:center; gap:10px; padding:9px 4px; border-bottom:1px solid var(--line); font-size:14.5px}
  .prepitem:last-child{border-bottom:none}
  .prepitem .pday{flex:0 0 64px; font-size:12px; color:var(--muted); font-weight:600}
  .prepitem.done span.pt{text-decoration:line-through; color:var(--muted)}
  .prepitem .pt{flex:1}
  .pchk{width:24px; height:24px; border:1.5px solid var(--line); border-radius:8px; flex:none;
    display:inline-flex; align-items:center; justify-content:center; font-size:14px; color:#fff; cursor:pointer; background:var(--card)}
  .prepitem.done .pchk{background:var(--green); border-color:var(--green)}

  .shopitem{display:flex; align-items:center; gap:10px; padding:10px 4px; border-bottom:1px solid var(--line); font-size:15px}
  .shopitem:last-child{border-bottom:none}
  .shopitem .sname{flex:1}
  .shopitem .scat{font-size:11.5px; border-radius:999px; padding:2px 9px; font-weight:600}
  .scat.cold{background:var(--c-cold-bg); color:var(--c-cold)}
  .scat.frz{background:var(--c-frz-bg); color:var(--c-frz)}
  .scat.room{background:var(--c-room-bg); color:var(--c-room)}
  .scat.sce{background:var(--c-sce-bg); color:var(--c-sce)}
  .sdel{color:var(--muted); font-size:18px; padding:2px 8px; cursor:pointer; background:none; border:none}
  .catpick{display:flex; gap:6px}
  .catpick button{border:1.5px solid var(--line); background:var(--card); border-radius:999px;
    padding:7px 12px; font-size:12.5px; color:var(--muted); cursor:pointer; font-family:inherit; font-weight:600}
  .catpick button.on.cold{background:var(--c-cold-bg); border-color:var(--c-cold); color:var(--c-cold)}
  .catpick button.on.frz{background:var(--c-frz-bg); border-color:var(--c-frz); color:var(--c-frz)}
  .catpick button.on.room{background:var(--c-room-bg); border-color:var(--c-room); color:var(--c-room)}
  .catpick button.on.sce{background:var(--c-sce-bg); border-color:var(--c-sce); color:var(--c-sce)}

  .rcard{border:1px solid var(--line); border-radius:12px; padding:12px 13px; margin-bottom:10px}
  .rcard.hit{border-color:#BFDCCF; background:var(--green-bg)}
  .rtop{display:flex; align-items:center; gap:8px}
  .rname{font-size:15.5px; font-weight:600; flex:1}
  .rdel{color:var(--muted); font-size:18px; padding:2px 6px; cursor:pointer; background:none; border:none}
  .rmemo{font-size:13px; color:var(--muted); margin:5px 0 8px; white-space:pre-wrap}
  .reacts{display:flex; gap:7px; flex-wrap:wrap}
  .react{border:1.5px solid var(--line); background:var(--card); border-radius:999px;
    padding:6px 12px; font-size:13.5px; color:var(--muted); cursor:pointer; font-family:inherit; font-weight:600}
  .react.on{background:#14523D; border-color:#14523D; color:#fff}
  .raddbox{border:1.5px dashed var(--line); border-radius:12px; padding:12px; margin-bottom:12px}
  .raddbox input{margin-bottom:8px}
  .raddbox textarea{height:64px; font-size:14px; margin-bottom:0}
  .filterrow{display:flex; gap:7px; margin-bottom:12px; flex-wrap:wrap}
  .filterrow button{border:1.5px solid var(--line); background:var(--card); border-radius:999px;
    padding:7px 13px; font-size:13px; color:var(--muted); cursor:pointer; font-family:inherit; font-weight:600}
  .filterrow button.on{background:var(--green-bg); border-color:var(--green); color:var(--green)}
  .tcard{margin-bottom:14px}
  .tcard .who{font-size:14.5px; font-weight:700; margin-bottom:6px}
  .tcard textarea{height:96px; font-size:14px}
</style>
</head>
<body>
<div class="wrap">
  <header><h1>우리집 식단앱</h1></header>
  <div id="todaybar"></div>
  <div class="nav" id="nav">
    <button data-p="fridge">재고</button>
    <button data-p="week">식단표</button>
    <button data-p="shop">장보기</button>
    <button data-p="recipe">레시피</button>
    <button data-p="taste">입맛</button>
  </div>
  <div id="page"></div>
</div>

<div class="sheet" id="sheet">
  <h3 id="sheetTitle"></h3>
  <textarea id="outText"></textarea>
  <button class="ok" id="sheetOk">닫기</button>
  <button class="cancel" id="sheetCancel">취소</button>
</div>
<div class="toast" id="toast"></div>

<script>
const SECTIONS = [
  {k:"cold", name:"냉장", suggest:["계란","두부","우유","김치","돼지고기","닭다리살","닭가슴살","어묵","치즈","그릭요거트","버터","양파","대파","당근","애호박","버섯","파프리카","알배기배추","오이","방울토마토"]},
  {k:"frz",  name:"냉동", suggest:["만두","냉동밥","다진마늘","채썬대파","새우","고등어","다짐육","소불고기","떡","식빵","냉동채소","빵가루","모짜렐라치즈","소세지","시금치","부추","청양고추"]},
  {k:"room", name:"실온", suggest:["쌀","스파게티면","국수면","라면","참치캔","옥수수캔","감자","양파","조미김","미역","오트밀","스팸","라이스페이퍼","오일"]},
  {k:"sce",  name:"소스·향신료", suggest:["국간장","진간장","된장","고추장","고춧가루","참기름","들기름","맛술","알룰로스","올리브유","카레가루","치킨스톡","후추","맛소금","부침가루","튀김가루","마요네즈","케찹","굴소스","식초","파슬리","바질"]}
];
const DAYS = [
  {d:"금", bt:"간장계란밥", theme:"파스타"},
  {d:"토", bt:"또띠아요리", lt:"비빔밥", theme:"수육"},
  {d:"일", bt:"샌드위치요리", lt:"볶음밥", theme:"고기구이"},
  {d:"월", bt:"햄계란주먹밥", theme:"고기구이"},
  {d:"화", bt:"스팸꼬마김밥", theme:"면요리"},
  {d:"수", bt:"삼각김밥", theme:"전골"},
  {d:"목", bt:"참치주먹밥", theme:"볶음밥·도리아"}
];
const WHO = [{k:"j",name:"지오"},{k:"h",name:"남편"},{k:"m",name:"나"}];
const CATNAME = {cold:"냉장",frz:"냉동",room:"실온",sce:"소스"};
const STATE_ORDER = {full:"low", low:"exp", exp:"full"};
const STATE_LABEL = {low:"(조금)", exp:"(임박!)"};

let fridge = {cold:[], frz:[], room:[], sce:[]};
let week = null;
let recipes = [];
let tastes = null;
let tags = [];
let shop = [];
const DEFAULT_TAGS = ["지오용","남편용","다이어트","밀프렙","간단 15분","국물요리","밑반찬"];
let page = "fridge", fActive = "cold", rFilter = "all", rTagSel = [], rEditIdx = -1;
let shopCat = "cold", sheetMode = "export";
let saveTimers = {};

function $(id){return document.getElementById(id)}
function esc(s){const d=document.createElement("div"); d.textContent=(s==null?"":s); return d.innerHTML.replace(/"/g,"&quot;")}

const MINE_SLOTS = [
  ["m1","8시"],["m2","11시"],["m3","2시"],["m4","5시"],["m5","요가후 8시"],["m6","차"]
];
function defaultMine(){
  return {m1:"MCT오일, 계란2개, 디카페인커피", m2:"닭가슴살 1/2, 그릭요거트",
    m3:"닭가슴살 1/2, 채소", m4:"렌틸귀리콩밥, 일반식",
    m5:"계란2개, 올리브유, 다크초콜렛", m6:"페퍼민트유자차, 보이차"};
}
function defaultWeek(){
  const days = {};
  DAYS.forEach(x=> days[x.d] = {b:"", l:"", n:""});
  return {days, snack:"과일, 우유", prep:[], mine:defaultMine()};
}
function defaultTastes(){
  return {
    j:"감칠맛 있고 복합적인 맛에 잘 반응. 채소는 잘게 썰거나 숨기면 먹음. 좋아함: . 싫어함: ",
    h:"양이 충분하고 친숙한 맛 선호. 좋아함: . 싫어함: ",
    m:"저탄수 고단백 기본. 감칠맛·복합적인 맛 좋아함. 오전~저녁은 건강식 가능."
  };
}

function loadKey(key, fallback){
  try{
    const v = localStorage.getItem(key);
    if(v) return JSON.parse(v);
  }catch(e){}
  return fallback;
}
function save(key, value){
  clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(()=>{
    try{ localStorage.setItem(key, JSON.stringify(value)); }
    catch(e){ toast("저장이 안 됐어요. 저장 공간을 확인해 주세요"); }
  }, 400);
}

function init(){
  fridge  = loadKey("fridge-inventory", fridge);
  if(fridge.veg){
    fridge.cold = (fridge.cold||[]).concat(fridge.veg);
    delete fridge.veg;
    save("fridge-inventory", fridge);
  }
  if(!fridge.sce) fridge.sce = [];
  if(!fridge.room) fridge.room = [];
  if(!fridge.cold) fridge.cold = [];
  if(!fridge.frz) fridge.frz = [];
  week    = loadKey("meal-week", defaultWeek());
  if(typeof week.prep === "string"){
    week.prep = week.prep.trim() ? [{date:"", t:week.prep, done:false}] : [];
    save("meal-week", week);
  }
  if(!Array.isArray(week.prep)) week.prep = [];
  if(!week.mine || week.mine.m1===undefined){
    week.mine = defaultMine();
    save("meal-week", week);
  }
  recipes = loadKey("meal-recipes", []);
  recipes.forEach(r=>{ if(!r.tg) r.tg=[]; });
  tastes  = loadKey("meal-tastes", defaultTastes());
  tags    = loadKey("meal-tags", DEFAULT_TAGS.slice());
  shop    = loadKey("meal-shop", []);
  render();
}

function todayISO(){
  const t = new Date();
  return t.getFullYear()+"-"+String(t.getMonth()+1).padStart(2,"0")+"-"+String(t.getDate()).padStart(2,"0");
}
function dayLabel(iso){
  if(!iso) return "";
  const d = new Date(iso+"T00:00:00");
  if(isNaN(d)) return iso;
  const names=["일","월","화","수","목","금","토"];
  return (d.getMonth()+1)+"/"+d.getDate()+"("+names[d.getDay()]+")";
}

function renderToday(){
  const bar = $("todaybar");
  const t = todayISO();
  const tomorrow = new Date(Date.now()+86400000);
  const tm = tomorrow.getFullYear()+"-"+String(tomorrow.getMonth()+1).padStart(2,"0")+"-"+String(tomorrow.getDate()).padStart(2,"0");
  const todo = week.prep.filter(p=>!p.done && (p.date===t || p.date===tm));
  if(todo.length===0){ bar.innerHTML=""; return; }
  const lines = todo.map(p=> (p.date===t?"오늘":"내일")+" · "+esc(p.t)).join("<br>");
  bar.innerHTML = '<div class="todaybar">'+lines+'</div>';
}

function render(){
  document.querySelectorAll("#nav button").forEach(b=>{
    b.className = (b.dataset.p===page ? "on" : "");
    b.onclick = ()=>{ page = b.dataset.p; render(); };
  });
  renderToday();
  if(page==="fridge") renderFridge();
  else if(page==="week") renderWeek();
  else if(page==="shop") renderShop();
  else if(page==="recipe") renderRecipes();
  else renderTastes();
}

/* ---------- 재고 ---------- */
function renderFridge(){
  const p = $("page");
  let h = '<div class="legend"><span><i style="background:var(--green)"></i>충분</span><span><i style="background:var(--amber)"></i>조금 남음</span><span><i style="background:var(--red)"></i>유통기한 임박</span></div>';
  h += '<div class="ftabs">';
  SECTIONS.forEach(s=>{
    h += '<button class="ftab'+(s.k===fActive?" on":"")+'" data-k="'+s.k+'">'+s.name+'<span class="cnt">'+fridge[s.k].length+'개</span></button>';
  });
  h += '</div><div class="panel"><p class="sec-title" id="fsec"></p><div class="items" id="fitems"></div>';
  h += '<div class="addrow"><input id="newItem" type="text" placeholder="직접 입력 (예: 깻잎)" enterkeyhint="done"><button id="addBtn">추가</button></div>';
  h += '<p class="sec-title" style="margin-top:16px">자주 쓰는 것 — 탭해서 추가</p><div class="chips" id="fchips"></div></div>';
  h += '<button class="pagebtn" id="askMeal">클로드에게 식단 요청 목록 만들기</button>';
  h += '<p class="hint">재고 + 가족 입맛 + 반응 좋았던 레시피 + 식단코드 형식까지 한 번에 복사돼요. 클로드 답변의 식단코드를 식단표 탭에서 붙여넣으면 자동 입력돼요. 재료는 탭할 때마다 충분 → 조금 → 임박 순서로 바뀌어요.</p>';
  p.innerHTML = h;

  document.querySelectorAll(".ftab").forEach(b=> b.onclick = ()=>{ fActive=b.dataset.k; render(); });
  const sec = SECTIONS.find(s=>s.k===fActive);
  $("fsec").textContent = sec.name + "에 있는 것";
  const wrap = $("fitems");
  if(fridge[fActive].length===0){
    wrap.innerHTML = '<p class="empty">아직 비어 있어요. 아래에서 탭해서 채워주세요.</p>';
  }else{
    fridge[fActive].forEach((it,i)=>{
      const cls = it.s==="low"?"low":(it.s==="exp"?"exp":"full");
      const el = document.createElement("span");
      el.className = "item "+cls;
      el.innerHTML = '<span class="dot"></span>'+esc(it.n)+'<span class="del" role="button" aria-label="삭제">×</span>';
      el.onclick = (e)=>{
        if(e.target.classList.contains("del")) fridge[fActive].splice(i,1);
        else it.s = STATE_ORDER[it.s] || "low";
        save("fridge-inventory", fridge); render();
      };
      wrap.appendChild(el);
    });
  }
  const chips = $("fchips");
  const have = new Set(fridge[fActive].map(x=>x.n));
  sec.suggest.filter(n=>!have.has(n)).forEach(n=>{
    const c = document.createElement("button");
    c.className="chip"; c.textContent="+ "+n;
    c.onclick = ()=>{ fridge[fActive].push({n:n,s:"full"}); save("fridge-inventory",fridge); render(); };
    chips.appendChild(c);
  });
  const add = ()=>{
    const v = $("newItem").value.trim(); if(!v) return;
    if(!fridge[fActive].some(x=>x.n===v)){ fridge[fActive].push({n:v,s:"full"}); save("fridge-inventory",fridge); }
    $("newItem").value=""; render();
  };
  $("addBtn").onclick = add;
  $("newItem").addEventListener("keydown", e=>{ if(e.key==="Enter"){e.preventDefault(); add();} });
  $("askMeal").onclick = ()=> showSheet("클로드에게 보낼 식단 요청", buildAskText(), "export");
}

/* ---------- 식단코드 ---------- */
function applyMealCode(txt){
  const m = txt.match(/\{[\s\S]*\}/);
  if(!m) return false;
  let d;
  try{ d = JSON.parse(m[0]); }catch(e){ return false; }
  if(d.type!=="week" || !d.days) return false;
  DAYS.forEach(x=>{
    const src = d.days[x.d];
    if(src) week.days[x.d] = {b:src.b||"", l:src.l||"", n:src.n||""};
  });
  if(d.snack) week.snack = d.snack;
  week.prep = Array.isArray(d.prep) ? d.prep.map(p=>({date:p.date||"", t:p.t||"", done:false})) : [];
  if(Array.isArray(d.buy)){
    d.buy.forEach(b=>{
      const c = ["cold","frz","room","sce"].includes(b.c) ? b.c : "cold";
      if(b.n && !shop.some(x=>x.n===b.n)) shop.push({n:b.n, c:c});
    });
  }
  save("meal-week",week); save("meal-shop",shop);
  return true;
}

  SECTIONS.forEach(s=>{
    if(fridge[s.k].length===0) return;
    t += "["+s.name+"] " + fridge[s.k].map(x=> x.n+(STATE_LABEL[x.s]||"")).join(", ") + "\n";
  });
  t += "\n👅 가족 입맛\n";
  t += "지오: "+tastes.j+"\n남편: "+tastes.h+"\n나: "+tastes.m+"\n";
  const hits = recipes.filter(r=> WHO.some(w=>r.re[w.k]));
  if(hits.length){
    t += "\n⭐ 반응 좋았던 레시피\n";
    hits.forEach(r=>{
      const who = WHO.filter(w=>r.re[w.k]).map(w=>w.name).join("·");
      const tg = r.tg && r.tg.length ? " ["+r.tg.join(", ")+"]" : "";
      t += "- "+r.n+tg+" ("+who+" 👍)\n";
    });
  }
  t += "\n📋 형식: 금~목 주간, 지오·남편용. 아침 요일테마: 금 간장계란밥, 토 또띠아요리, 일 샌드위치, 월 햄계란주먹밥, 화 스팸꼬마김밥, 수 삼각김밥, 목 참치주먹밥. 점심은 주말만: 토 비빔밥, 일 볶음밥. 저녁 요일테마: 금 파스타, 토 수육, 일 고기구이, 월 고기구이, 화 면요리, 수 전골, 목 볶음밥·도리아. 내 식단은 시간대별 고정. (임박!) 표시 재료를 최우선 소진\n";
  t += "\n→ 이걸로 이번 주 식단이랑 최소 장보기 목록 짜줘.\n";
  t += '답변 맨 마지막에 우리집 식단앱에 붙여넣을 "식단코드"를 코드블록으로 줘. 형식:\n';
  t += '{"type":"week","days":{"금":{"b":"아침","l":"","n":"저녁"},"토":{},"일":{},"월":{},"화":{},"수":{},"목":{}},"snack":"","prep":[{"date":"YYYY-MM-DD","t":"해동·손질 할 일"}],"buy":[{"n":"살 것","c":"cold|frz|room|sce"}]}';
  return t;
}
function buildWeekText(){
  let t = "📅 이번 주 식단표 (금~목)\n";
  DAYS.forEach(x=>{
    const d = week.days[x.d];
    t += "\n"+x.d+"요일";
    if(d.b) t += "\n  아침: "+d.b;
    if(d.l) t += "\n  점심: "+d.l;
    if(d.n) t += "\n  저녁: "+d.n;
  });
  t += "\n\n간식: "+week.snack;
  if(week.prep.length){
    t += "\n\n준비할 일\n";
    week.prep.forEach(p=>{ t += "- "+dayLabel(p.date)+" "+p.t+"\n"; });
  }
  return t;
}
function downloadIcs(){
  const evs = week.prep.filter(p=>p.date && !p.done);
  if(evs.length===0){ toast("날짜가 있는 준비할 일이 없어요"); return; }
  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//mealapp//KR\r\n";
  const stamp = new Date().toISOString().replace(/[-:.]/g,"").slice(0,15)+"Z";
  evs.forEach((p,i)=>{
    const dt = p.date.replace(/-/g,"")+"T190000";
    ics += "BEGIN:VEVENT\r\nUID:meal-"+p.date+"-"+i+"@mealapp\r\nDTSTAMP:"+stamp+"\r\nDTSTART:"+dt+"\r\nSUMMARY:🍳 "+p.t.replace(/[,;\\]/g," ")+"\r\nBEGIN:VALARM\r\nTRIGGER:PT0S\r\nACTION:DISPLAY\r\nDESCRIPTION:식단 준비\r\nEND:VALARM\r\nEND:VEVENT\r\n";
  });
  ics += "END:VCALENDAR\r\n";
  const blob = new Blob([ics], {type:"text/calendar"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "식단준비알림.ics";
  document.body.appendChild(a); a.click(); a.remove();
}
async function showSheet(title, txt, mode){
  sheetMode = mode;
  $("sheetTitle").textContent = title;
  const ta = $("outText");
  ta.value = txt;
  ta.readOnly = (mode==="export");
  $("sheetOk").textContent = (mode==="export") ? "닫기" : (mode==="import" ? "식단 가져오기" : "복원하기");
  $("sheetCancel").style.display = (mode==="export") ? "none" : "block";
  $("sheet").classList.add("show");
  if(mode==="export"){
    try{
      await navigator.clipboard.writeText(txt);
      toast("복사됐어요! 붙여넣기만 하면 돼요");
    }catch(e){
      ta.focus(); ta.select();
      toast("아래 글을 길게 눌러 복사해 주세요");
    }
  }else{
    ta.focus();
  }
}
$("sheetOk").onclick = ()=>{
  if(sheetMode==="import"){
    if(applyMealCode($("outText").value)){
      $("sheet").classList.remove("show");
      page="week"; toast("식단표·장보기·준비할 일이 채워졌어요!"); render();
    }else toast("식단코드를 찾지 못했어요. 코드블록 전체를 붙여넣어 주세요");
    return;
  }
  if(sheetMode==="restore"){
    try{
      const d = JSON.parse($("outText").value);
      if(d.fridge) fridge=d.fridge; if(d.week) week=d.week;
      if(d.recipes) recipes=d.recipes; if(d.tastes) tastes=d.tastes;
      if(d.tags) tags=d.tags; if(d.shop) shop=d.shop;
      localStorage.setItem("fridge-inventory",JSON.stringify(fridge));
      localStorage.setItem("meal-week",JSON.stringify(week));
      localStorage.setItem("meal-recipes",JSON.stringify(recipes));
      localStorage.setItem("meal-tastes",JSON.stringify(tastes));
      localStorage.setItem("meal-tags",JSON.stringify(tags));
      localStorage.setItem("meal-shop",JSON.stringify(shop));
      $("sheet").classList.remove("show");
      toast("복원됐어요!"); init();
    }catch(e){ toast("백업 글이 아닌 것 같아요. 다시 확인해 주세요"); }
    return;
  }
  $("sheet").classList.remove("show");
};
$("sheetCancel").onclick = ()=> $("sheet").classList.remove("show");
function toast(msg){
  const t=$("toast"); t.textContent=msg; t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"), 2400);
}
init();
</script>
